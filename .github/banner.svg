<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <filter id="b1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="b2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="b3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Cream background -->
  <rect width="900" height="160" fill="#f5f0eb" rx="8"/>

  <!-- Watercolor blobs -->
  <ellipse cx="95" cy="48" rx="125" ry="78" fill="#c5d4b8" opacity="0.28" filter="url(#b1)"/>
  <ellipse cx="55" cy="128" rx="85" ry="52" fill="#c5d4b8" opacity="0.18" filter="url(#b2)"/>
  <ellipse cx="820" cy="105" rx="115" ry="72" fill="#c5d4b8" opacity="0.22" filter="url(#b1)"/>
  <ellipse cx="865" cy="32" rx="72" ry="46" fill="#d4c8b8" opacity="0.18" filter="url(#b2)"/>
  <ellipse cx="190" cy="145" rx="65" ry="38" fill="#d4c8b8" opacity="0.14" filter="url(#b3)"/>
  <ellipse cx="700" cy="20" rx="55" ry="30" fill="#c5d4b8" opacity="0.12" filter="url(#b3)"/>

  <!-- Thin border frame -->
  <rect x="20" y="16" width="860" height="128" rx="5" fill="none" stroke="#c5d4b8" stroke-width="1" opacity="0.65"/>

  <!-- Corner accent dots -->
  <circle cx="20" cy="16" r="3" fill="#c5d4b8" opacity="0.65"/>
  <circle cx="880" cy="16" r="3" fill="#c5d4b8" opacity="0.65"/>
  <circle cx="20" cy="144" r="3" fill="#c5d4b8" opacity="0.65"/>
  <circle cx="880" cy="144" r="3" fill="#c5d4b8" opacity="0.65"/>

  <!-- Five dots — one per room -->
  <circle cx="426" cy="46" r="2.5" fill="#a8bc98" opacity="0.9"/>
  <circle cx="438" cy="46" r="2.5" fill="#a8bc98" opacity="0.9"/>
  <circle cx="450" cy="46" r="2.5" fill="#a8bc98" opacity="0.9"/>
  <circle cx="462" cy="46" r="2.5" fill="#a8bc98" opacity="0.9"/>
  <circle cx="474" cy="46" r="2.5" fill="#a8bc98" opacity="0.9"/>

  <!-- Main title -->
  <text
    x="450" y="94"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    fill="#4a3728"
    text-anchor="middle"
    letter-spacing="2">Vivian&#x2019;s rooms</text>

  <!-- Subtitle: rooms list -->
  <text
    x="450" y="122"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12.5"
    fill="#7a6352"
    text-anchor="middle"
    font-style="italic"
    letter-spacing="1.5">bedroom  &#xb7;  aquarium  &#xb7;  kitchen  &#xb7;  garden  &#xb7;  study</text>
</svg>
